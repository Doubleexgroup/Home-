<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Premium</title>

  <style>
    :root {
      --text: #ffffff;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      height: 100vh;

      /* 👉 QUI CAMBI LO SFONDO */
      background: url("sonfo landing 2.jpg") no-repeat center center;
      background-size: cover;

      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* overlay per leggibilità */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 100%;
      max-width: 900px;
      padding: 20px;
    }

    h1 {
      font-size: 2.6rem;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 60px;
    }

    .logos {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 120px;
      flex-wrap: wrap;
    }

    .logo {
      transition: all 0.35s ease;
    }

    .logo img {
      width: 200px;
      height: auto;
      transition: all 0.35s ease;
    }

    .logo:hover img {
      transform: scale(1.15);
      filter: brightness(1.2);
    }

    .logo:hover {
      transform: translateY(-12px);
    }

    a {
      text-decoration: none;
    }

    /* animazione entrata */
    .fade {
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 0.8s ease forwards;
    }

    .delay1 { animation-delay: 0.2s; }
    .delay2 { animation-delay: 0.4s; }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* mobile */
    @media (max-width: 700px) {
      .logos {
        gap: 50px;
      }

      .logo img {
        width: 140px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Scegli la tua destinazione</h1>
    <p>Seleziona uno dei due siti</p>

    <div class="logos">

      <!-- LOGO 1 -->
      <a href="https://doubleexhome.com/" target="_blank" class="logo fade delay1">
        <img src="logo double ex home 2.jpg" alt="Sito 1">
      </a>

      <!-- LOGO 2 -->
      <a href="https://dinnerinthesky.it/" target="_blank" class="logo fade delay2">
        <img src="dinnero in the sky logo.jpg" alt="Sito 2">
      </a>

    </div>
  </div>

</body>
</html>
