<!DOCTYPE html>
<html lang="it">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Landing | Azienda</title>

<!-- Font Awesome per icone social -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
  :root {
    --background-color: #1e3a8a; /* Sfondo blu modificabile */
    --text-color: #ffffff;
    --accent-color: #e63946;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

  html, body { height: 100%; }

  body {
    display: flex;
    flex-direction: column;
    background: var(--background-color);
    color: var(--text-color);
  }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 50px 20px;
  }

  h1 { font-size: 2.8rem; text-align: center; margin-bottom: 10px; }
  p.subtitle { text-align: center; opacity: 0.8; margin-bottom: 50px; }

  /* Piramide loghi */
  .pyramid { display: flex; flex-direction: column; align-items: center; gap: 50px; }

  .pyramid-top img {
    width: 260px; max-width: 80%;
    opacity: 0; transform: translateY(50px) scale(0.8);
    animation: wow 0.8s forwards ease;
    animation-delay: 0.2s;
  }

  .pyramid-bottom {
    display: flex; gap: 80px; flex-wrap: wrap; justify-content: center;
  }

  .pyramid-bottom .logo img {
    width: 160px; 
    opacity: 0; transform: translateY(50px) scale(0.8);
    animation: wow 0.8s forwards ease;
  }

  /* Delay a cascata */
  .pyramid-bottom .logo:nth-child(1) img { animation-delay: 0.5s; }
  .pyramid-bottom .logo:nth-child(2) img { animation-delay: 0.8s; }

  .logo:hover img { transform: scale(1.1); filter: brightness(1.2); transition: transform 0.3s; }

  a { text-decoration: none; color: inherit; }

  /* Animazione WOW */
  @keyframes wow {
    from { opacity: 0; transform: translateY(50px) scale(0.8); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Footer */
  footer {
    background: var(--background-color);
    color: var(--text-color);
    width: 100%;
    padding: 40px 20px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .footer-section h3 { color: var(--accent-color); margin-bottom: 15px; text-transform: uppercase; }
  .footer-section p, .footer-section a, .contact-item span { color: var(--text-color); opacity: 0.9; font-size: 0.95rem; }
  .contact-item { display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 10px; }
  .contact-item i { width: 20px; }

  .social-icons { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
  .social-icons a {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 40px; border-radius: 50%;
    background: rgba(255,255,255,0.1); color: #fff; transition: 0.3s;
  }
  .social-icons a:hover { background: #fff; color: #000; transform: scale(1.1); }

  .footer-bottom {
    margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 10px; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px;
    font-size: 0.85rem;
  }
  .footer-bottom a { color: var(--text-color); text-decoration: none; }

  @media(max-width:700px){
    h1{font-size:1.8rem;}
    .pyramid-bottom{gap:40px;}
    .pyramid-bottom .logo img{width:120px;}
  }
</style>
</head>

<body>

<main>
  <h1>Scopri le nostre destinazioni</h1>
  <p class="subtitle">Seleziona uno dei nostri siti</p>

  <div class="pyramid">
    <div class="pyramid-top">
      <img src="logo-vertice.png" alt="Logo principale">
    </div>
    <div class="pyramid-bottom">
      <a href="URL_SITO_1" target="_blank" class="logo"><img src="logo1.png" alt="Sito 1"></a>
      <a href="URL_SITO_2" target="_blank" class="logo"><img src="logo2.png" alt="Sito 2"></a>
    </div>
  </div>
</main>

<footer>
  <div class="footer-section">
    <h3>Contatti</h3>
    <div class="contact-item"><i class="fas fa-phone"></i><span>+39 000 000 0000</span></div>
    <div class="contact-item"><i class="fas fa-envelope"></i><span>info@azienda.com</span></div>
    <div class="contact-item"><i class="fas fa-map-marker-alt"></i><span>Via Indirizzo, Città</span></div>
  </div>

  <div class="footer-section">
    <h3>Seguici</h3>
    <div class="social-icons">
      <a href="URL_FACEBOOK" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="URL_INSTAGRAM" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="URL_LINKEDIN" target="_blank"><i class="fab fa-linkedin-in"></i></a>
      <a href="URL_TIKTOK" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </div>

  <div class="footer-bottom">
    <span>© 2026 Nome Azienda</span>
    <a href="#">Privacy</a>|<a href="#">Cookie</a>|<a href="#">Termini</a>
  </div>
</footer>

</body>
</html>
