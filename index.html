<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing | Azienda</title>
  <meta name="description" content="Landing page con accesso ai siti del gruppo aziendale">

  <!-- Font Awesome per icone social -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    /* =====================
       RESET E BASE
    ===================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    :root {
      --text-color: #ffffff;
      --accent-color: #e63946;
      --footer-bg: rgba(0, 0, 0, 0.8);
    }

    body {
      min-height: 100vh;
      background: url("sfondo-landing.jpg") no-repeat center center/cover;
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 0;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      z-index: 1;
      padding: 50px 20px;
      text-align: center;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
    }

    p.subtitle {
      margin-bottom: 50px;
      opacity: 0.8;
    }

    /* =====================
       PIRAMIDE LOGHI
    ===================== */
    .pyramid {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 50px;
    }

    .pyramid-top img {
      width: 260px;
      max-width: 80%;
      transition: transform 0.3s ease;
    }

    .pyramid-bottom {
      display: flex;
      gap: 80px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .logo img {
      width: 160px;
      transition: all 0.3s ease;
    }

    .logo:hover img {
      transform: scale(1.1);
      filter: brightness(1.2);
    }

    .logo:hover {
      transform: translateY(-8px);
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* =====================
       FOOTER
    ===================== */
    footer {
      background: var(--footer-bg);
      padding: 50px 20px 30px;
      position: relative;
      z-index: 1;
    }

    .footer-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .footer-section h3 {
      margin-bottom: 15px;
      font-size: 1.1rem;
      text-transform: uppercase;
      color: var(--accent-color);
    }

    .footer-section p,
    .footer-section a {
      color: #fff;
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .contact-item i {
      width: 20px;
    }

    .social-icons {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    .social-icons a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      transition: 0.3s;
    }

    .social-icons a:hover {
      background: #fff;
      color: #000;
      transform: scale(1.1);
    }

    .footer-bottom {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      font-size: 0.85rem;
    }

    .footer-bottom a {
      color: #fff;
      text-decoration: none;
      margin-left: 10px;
    }

    /* =====================
       RESPONSIVE
    ===================== */
    @media (max-width: 700px) {
      h1 {
        font-size: 1.8rem;
      }

      .pyramid-bottom {
        gap: 40px;
      }

      .logo img {
        width: 120px;
      }

      .footer-container {
        text-align: center;
      }

      .footer-bottom {
        flex-direction: column;
        text-align: center;
        gap: 10px;
      }
    }
  </style>
</head>

<body>

  <main>
    <div class="container">

      <h1>Scopri le nostre destinazioni</h1>
      <p class="subtitle">Seleziona uno dei nostri siti</p>

      <div class="pyramid">
        <!-- Logo vertice -->
        <div class="pyramid-top">
          <img src="doubleexgroup.png" alt="Logo principale">
        </div>

        <!-- Loghi cliccabili -->
        <div class="pyramid-bottom">
          <a href="https://doubleexhome.com/" target="_blank" class="logo">
            <img src="doubleexhome 3.png" alt="Sito 1">
          </a>
          <a href="https://dinnerinthesky.it/" target="_blank" class="logo">
            <img src="dinner 2.png" alt="Sito 2">
          </a>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-container">

      <!-- Contatti -->
      <div class="footer-section">
        <h3>Contatti</h3>
        <div class="contact-item">
          <i class="fas fa-phone"></i> <span>+39 000 000 0000</span>
        </div>
        <div class="contact-item">
          <i class="fas fa-envelope"></i> <span>info@azienda.com</span>
        </div>
        <div class="contact-item">
          <i class="fas fa-map-marker-alt"></i> <span>Via Indirizzo, Città</span>
        </div>
      </div>

      <!-- Informazioni azienda -->
      <div class="footer-section">
        <h3>Azienda</h3>
        <p>P.IVA: XXXXXXXX</p>
        <p>REA: XXXXXXX</p>
        <p>Capitale sociale: € XXXXX</p>
      </div>

      <!-- Social -->
      <div class="footer-section">
        <h3>Seguici</h3>
        <div class="social-icons">
          <a href="URL_FACEBOOK" target="_blank"><i class="fab fa-facebook-f"></i></a>
          <a href="URL_INSTAGRAM" target="_blank"><i class="fab fa-instagram"></i></a>
          <a href="URL_LINKEDIN" target="_blank"><i class="fab fa-linkedin-in"></i></a>
          <a href="URL_TIKTOK" target="_blank"><i class="fab fa-tiktok"></i></a>
        </div>
      </div>

    </div>

    <div class="footer-bottom">
      <span>© 2026 Nome Azienda</span>
      <div>
        <a href="#">Privacy</a> |
        <a href="#">Cookie</a> |
        <a href="#">Termini</a>
      </div>
    </div>
  </footer>

</body>
</html>
